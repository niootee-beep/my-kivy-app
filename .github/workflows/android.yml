name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04  # Sử dụng 22.04 ổn định hơn cho Buildozer hiện tại
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev autoconf-archive automake libtool-bin gettext build-essential
          pip3 install --upgrade pip
          pip3 install cython==0.29.37 buildozer

      # MẸO QUAN TRỌNG: Cài đặt SDK thủ công để Buildozer không bị rối đường dẫn
      - name: Install Android SDK tools
        run: |
          mkdir -p ~/.buildozer/android-sdk/cmdline-tools
          cd ~/.buildozer/android-sdk/cmdline-tools
          curl -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip sdk-tools.zip
          mv cmdline-tools latest
          # Chấp nhận license ngay tại đây
          yes | ./latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android-sdk --licenses

      - name: Build APK with Buildozer
        run: |
          # Thêm YES để tự động đồng ý các yêu cầu trong lúc build
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Point-Hunter
          path: bin/*.apk
          
