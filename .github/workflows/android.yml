name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSerebrenninkov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master
          # Lệnh này bảo GitHub chui vào thư mục con để tìm file
          workdir: my-kivy-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          # Tìm mọi file .apk được tạo ra trong thư mục con
          path: my-kivy-app/bin/*.apk
          
